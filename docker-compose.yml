services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_apply
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

# NOTE: Local dev runs the backend as a manual uvicorn from backend/ (see
# CLAUDE.md), NOT in Docker. An `api` service used to live here running a stale
# baked image (`ak247-backend-resume-ocr`) that bound :8000 and shadowed the
# dev server, so every code change silently did nothing. Compose now brings up
# infra only. Prod builds from backend/Dockerfile.prod, unaffected by this file.

volumes:
  postgres_data:
