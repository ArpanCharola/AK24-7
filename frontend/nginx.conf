server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip text-y assets — small image, big bandwidth saving
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css text/javascript application/javascript application/json
               image/svg+xml font/woff font/woff2;

    # Cache hashed Vite assets aggressively (filenames change on rebuild)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # No-cache the entry HTML so users always pick up new asset hashes
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Plain healthcheck for Traefik / Docker
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # SPA fallback — /jobs, /discovered-jobs, etc. all hit the same index
    location / {
        try_files $uri $uri/ /index.html;
    }
}
